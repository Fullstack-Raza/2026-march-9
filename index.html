<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guess Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

  <div class="card">

    <!-- Top Bar -->
    <div class="topbar">
      <p>Attempt : <span id="attmpt">--</span></p>
      <p>Win : <span id="win">0</span></p>
      <p>Lose : <span id="lose">0</span></p>
      <p>Total : <span id="totale">0</span></p>
    </div>

    <!-- Start Button -->
    <div class="start">
      <p>Start</p>
    </div>

    <!-- Game Instruction -->
    <div class="game-dis">
      <p>Guess the number from 0 to 100</p>
    </div>

    <!-- Game Input -->
    <div class="game">
      <input type="number" id="guessInput" placeholder="Enter number">
      <button id="checkBtn">Check</button>
    </div>

    <!-- Result -->
    <div class="game-result"></div>

  </div>

</div>

<script src="js.js"></script>

</body>
</html>
